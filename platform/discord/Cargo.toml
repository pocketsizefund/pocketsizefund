[package]
name = "discord"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/main.rs"
name = "discord"

[dependencies]
actix-web = "4.8.0"
chrono = "0.4.38"
cloudevents-sdk = { version = "0.7.0", features = ["actix", "actix-web", "reqwest"] }
env_logger = "0.11.5"
reqwest = "0.12.5"
sentry = "0.34.0"
serde = "1.0.203"
serde_json = "1.0.117"
tokio = { version = "1.38.0", features = ["macros", "rt-multi-thread"] }
tracing = "0.1.40"
url = "2.5.2"

[target.'cfg(windows)'.dependencies]
winreg = "0.52.0"

[dev-dependencies]
actix-web-test = "0.0.1"
cargo-machete = "0.6.2"
cargo-tarpaulin = "0.31.0"
reqwest = "0.12.5"

